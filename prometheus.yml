global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'health-management-backend'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'health-management'
          component: 'backend'
  
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'health-management'
          component: 'redis'
  
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          service: 'health-management'
          component: 'rabbitmq'