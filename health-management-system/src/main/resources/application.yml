spring:
  application:
    name: health-management-system
  config:
    import: optional:file:./config/application-secret.yml
  
  # 数据源配置
  datasource:
    # 主数据库配置
    master:
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:health_management}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
    
    # 从数据库配置（本地开发使用同一数据库）
    slave:
      jdbc-url: jdbc:mysql://${MYSQL_SLAVE_HOST:localhost}:${MYSQL_SLAVE_PORT:3306}/${MYSQL_DB:health_management}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${MYSQL_SLAVE_USERNAME:root}
      password: ${MYSQL_SLAVE_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
    open-in-view: false
  
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000
  
  # RabbitMQ配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        concurrency: 3
        max-concurrency: 10
    publisher-confirm-type: correlated
    publisher-returns: true
  
  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5分钟
      cache-null-values: false
      use-key-prefix: true
  
  # 任务调度配置
  task:
    scheduling:
      pool:
        size: 5
    execution:
      pool:
        core-size: 10
        max-size: 20
        queue-capacity: 100

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# JWT配置
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}

# 本地默认使用模拟短信，验证码会返回给前端用于开发验证；生产环境请关闭并接入真实短信供应商
sms:
  debug-mode: ${SMS_DEBUG_MODE:true}

# 健康异常默认生成站内通知；如需短信提醒，将 HEALTH_ALERT_SMS_ENABLED 设为 true
health-alert:
  sms-enabled: ${HEALTH_ALERT_SMS_ENABLED:false}

# 华为运动健康接入配置。真实同步需要华为开发者应用与用户授权，当前接口会在缺配置时给出明确状态
huawei:
  health:
    client-id: ${HUAWEI_CLIENT_ID:}
    client-secret: ${HUAWEI_CLIENT_SECRET:}
    redirect-uri: ${HUAWEI_REDIRECT_URI:}
    auth-url: ${HUAWEI_HEALTH_AUTH_URL:https://oauth-login.cloud.huawei.com/oauth2/v3/authorize}
    token-url: ${HUAWEI_HEALTH_TOKEN_URL:https://oauth-login.cloud.huawei.com/oauth2/v3/token}
    scope: ${HUAWEI_HEALTH_SCOPE:https://www.huawei.com/healthkit/activity.read https://www.huawei.com/healthkit/heart.read}

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# AI服务配置
ai:
  # 默认AI服务提供商: mock, openai, baidu_wenxin, deepseek, qwen
  default-provider: ${AI_DEFAULT_PROVIDER:mock}
  # 请求超时时间（毫秒）
  timeout: 30000
  # 最大重试次数
  max-retries: 3
  # 速率限制：每分钟最大请求数
  rate-limit-per-minute: 30
  # 最大输入长度
  max-input-length: 2000
  # 最大输出长度
  max-output-length: 4000

  # OpenAI配置
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1
    model: gpt-3.5-turbo
    temperature: 0.7

  # 通义千问配置（API兼容OpenAI格式）
  qwen:
    api-key: ${QWEN_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus
    temperature: 0.7

  # DeepSeek配置（API兼容OpenAI格式）
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com/v1
    model: deepseek-chat
    temperature: 0.7

  # 百度千帆（文心一言）配置
  wenxin:
    api-key: ${WENXIN_API_KEY:}
    base-url: https://qianfan.baidubce.com/v2/chat/completions
    model: ernie-4.0-turbo-BK
    temperature: 0.7

# 分布式锁配置
distributed-lock:
  default-wait-time: 10000
  default-lease-time: 30000

# 限流配置
rate-limit:
  # 用户级别限流
  user:
    requests-per-minute: 30
    requests-per-hour: 200
  # IP级别限流
  ip:
    requests-per-minute: 60
    requests-per-hour: 500
  # 设备级别限流
  device:
    requests-per-minute: 100
    requests-per-hour: 1000

# 日志配置
logging:
  level:
    root: INFO
    com.health: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
